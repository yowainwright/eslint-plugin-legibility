name: update deps

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

env:
  SOCKET_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
  SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}

jobs:
  update-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
      - name: Enable pnpm
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Update dependencies
        run: pnpm run codependence:update
      - name: Install updated dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Update override metadata
        run: pnpm run pastoralist
      - name: Apply override updates
        run: pnpm install --no-frozen-lockfile
      - name: Verify dependency policy
        run: pnpm run codependence
      - name: Verify override metadata
        run: pnpm run pastoralist --dry-run --strict
      - run: pnpm validate
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.PR_CREATE_TOKEN }}
          commit-message: "chore: update dependencies"
          title: "[Codependence] update dependencies"
          body: |
            ## Dependency updates

            Auto-generated by [Codependence][1] and audited by [Pastoralist][2].

            [1]: https://github.com/yowainwright/codependence
            [2]: https://github.com/yowainwright/pastoralist
          branch: update-dependencies
          labels: codependencies
